<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="" viewport" content="width=device-width, initial-scale=1.0">
    <title>Slushieee - Now playin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background: url("/static/dashboardbg.jpeg") center / cover no-repeat;
            position: relative;
            overflow: hidden;
        }

        /* ── Sticky-note song banner (top-right) ─────────────────────────── */
        .sticky-note {
            position: absolute;
            top: 3.5%;
            right: 3.5%;
            width: 22%;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
        }

        .album-art {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
            background: #f5d0d8;
        }

        .album-art-placeholder {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f9b8c8, #f5d0d8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-weight: 700;
            color: #8b3a52;
            text-align: center;
            line-height: 1.3;
            max-width: 100%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .song-artist {
            font-size: 11px;
            color: #b05070;
            text-align: center;
            opacity: 0.85;
        }

        .idle-text {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-style: italic;
            color: #b05070;
            text-align: center;
            opacity: 0.75;
        }

        /* ── Player controls (top-left blank area) ────────────────────────── */
        .controls-area {
            position: absolute;
            top: 4%;
            left: 7%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
        }

        .controls-label {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-style: italic;
            color: #c25a7a;
            opacity: 0.7;
            letter-spacing: 0.04em;
        }

        .btn-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: url("/static/button.jpeg") center / cover no-repeat;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 14px rgba(194, 90, 122, 0.20);
            color: #8b3a52;
        }

        .ctrl-btn.play-pause {
            width: 80px;
            height: 80px;
            font-size: 28px;
        }

        .ctrl-btn:hover {
            transform: scale(1.12) rotate(-2deg);
            box-shadow: 0 8px 22px rgba(194, 90, 122, 0.32);
        }

        .ctrl-btn:active {
            transform: scale(0.96);
        }

        /* ── Progress bar ────────────────────────────────────────────────── */
        .progress-area {
            position: absolute;
            bottom: 38%;
            left: 7%;
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(194, 90, 122, 0.18);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f48aaa, #c25a7a);
            border-radius: 99px;
            transition: width 1s linear;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #b05070;
            opacity: 0.75;
        }

        /* ── Device name ─────────────────────────────────────────────────── */
        .device-badge {
            position: absolute;
            bottom: 32%;
            left: 7%;
            font-size: 10px;
            color: #b05070;
            opacity: 0.6;
            font-style: italic;
        }

        /* ── Logout ──────────────────────────────────────────────────────── */
        .logout-link {
            position: absolute;
            bottom: 29%;
            right: 4%;
            font-size: 11px;
            color: #b05070;
            opacity: 0.55;
            text-decoration: none;
            font-style: italic;
            transition: opacity 0.2s;
        }

        .logout-link:hover {
            opacity: 1;
        }

        /* ── Greeting ────────────────────────────────────────────────────── */

        .greeting {
            position: absolute;
            top: 27%;
            left: 7%;
            font-family: "Playfair Display", serif;
            font-size: 18px;
            color: #8b3a52;
            opacity: 0.65;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="sticky-note" id="sticky">
        <div class="album-art-placeholder" id="art-placeholder">♪</div>
        <img class="album-art" id="album-art" src="" alt="Album Art" style="display:none">
        <div class="song-title" id="song-title">
            <span class="idle-text">nothing playing~</span>
        </div>
        <div class="song-artist" id="song-artist"></div>
    </div>


    <div class="greeting">hi, {{ user.display_name.split()[0] if user.display_name else 'friend' }} ♡</div>


    <div class="controls-area">
        <span class="controls-label">♫ now playing</span>
        <div class="btn-row">
            <button class="ctrl-btn" id="btn-prev" title="Previous" onclick="playerAction('previous')">⏮</button>
            <button class="ctrl-btn play-pause" id="btn-play" title="Play / Pause"
                onclick="togglePlayPause()">▶</button>
            <button class="ctrl-btn" id="btn-next" title="Next" onclick="playerAction('next')">⏭</button>
        </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-area">
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="time-row">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
        </div>
    </div>

    <div class="device-badge" id="device-badge"></div>
    <a href="/logout" class="logout-link">logout ✕</a>

    <script>
        // ── Spotify Web Playback SDK ──────────────────────────────────────
        const TOKEN = "{{ token }}";
        let player;
        let isPlaying = false;

        window.onSpotifyWebPlaybackSDKReady = () => {
            player = new Spotify.Player({
                name: 'Slushieee Player',
                getOAuthToken: cb => cb(TOKEN),
                volume: 0.6
            });
            player.connect();
        };

        // ── Player controls ───────────────────────────────────────────────
        function playerAction(action) {
            fetch(`/api/player/${action}`, { method: 'POST' })
                .then(() => setTimeout(fetchNowPlaying, 400));
        }

        function togglePlayPause() {
            const action = isPlaying ? 'pause' : 'play';
            playerAction(action);
        }

        // ── Format ms → m:ss ─────────────────────────────────────────────
        function fmt(ms) {
            if (!ms) return '0:00';
            const s = Math.floor(ms / 1000);
            return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
        }

        // ── Now-playing poller ────────────────────────────────────────────
        let progressTimer = null;
        let localProgress = 0;
        let localDuration = 0;

        function startProgressTick() {
            clearInterval(progressTimer);
            progressTimer = setInterval(() => {
                if (!isPlaying) return;
                localProgress = Math.min(localProgress + 1000, localDuration);
                renderProgress();
            }, 1000);
        }

        function renderProgress() {
            const pct = localDuration ? (localProgress / localDuration) * 100 : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('time-current').textContent = fmt(localProgress);
            document.getElementById('time-total').textContent = fmt(localDuration);
        }

        function fetchNowPlaying() {
            fetch('/api/now-playing')
                .then(r => r.json())
                .then(data => {
                    if (data.error || !data.playing) {
                        // idle state
                        isPlaying = false;
                        document.getElementById('btn-play').textContent = '▶';
                        document.getElementById('song-title').innerHTML = '<span class="idle-text">nothing playing~</span>';
                        document.getElementById('song-artist').textContent = '';
                        document.getElementById('album-art').style.display = 'none';
                        document.getElementById('art-placeholder').style.display = 'flex';
                        document.getElementById('device-badge').textContent = '';
                        return;
                    }

                    isPlaying = data.playing;
                    document.getElementById('btn-play').textContent = isPlaying ? '⏸' : '▶';

                    // Song info
                    document.getElementById('song-title').textContent = data.title;
                    document.getElementById('song-artist').textContent = data.artist;

                    // Album art
                    if (data.album_art) {
                        const img = document.getElementById('album-art');
                        img.src = data.album_art;
                        img.style.display = 'block';
                        document.getElementById('art-placeholder').style.display = 'none';
                    }

                    // Device
                    document.getElementById('device-badge').textContent = data.device ? `♪ ${data.device}` : '';

                    // Progress
                    localProgress = data.progress_ms;
                    localDuration = data.duration_ms;
                    renderProgress();
                    if (isPlaying) startProgressTick();
                });
        }

        // Poll every 4s
        fetchNowPlaying();
        setInterval(fetchNowPlaying, 4000);
    </script>
</body>

</html>
