<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slushieee</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #fff;

            background: url("static/image.png") center / cover no-repeat;

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .card {
            width: 500px;
            aspect-ratio: 3 / 4;
            /* adjust depending on image shape */
            border-radius: 32px;
            overflow: hidden;
            background: url("static/card.jpeg") center / cover no-repeat;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            font-size: 28px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: black;
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: black;
            opacity: 0.8;
        }

        .open-btn {
            display: inline-block;
            margin-top: 28px;
            width: 180px;
            height: 72px;
            background: url("static/button.jpeg") center / cover no-repeat;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: #c25a7a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 4px 16px rgba(194, 90, 122, 0.18);
        }

        .open-btn:hover {
            transform: scale(1.06) rotate(-1deg);
            box-shadow: 0 8px 24px rgba(194, 90, 122, 0.28);
        }
    </style>

</head>

<body>

    <div class="card">
        <h1>Slushieee</h1>
        <p>I luv a cupcake n a slushieeee</p>
        <a href="/login" class="open-btn">Open ✿</a>
    </div>

</body>

</html>
