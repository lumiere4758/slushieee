<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 48px 64px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        p {
            color: #a0a0b0;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .routes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .route {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .route:hover { background: rgba(255,255,255,0.12); }
        .method {
            font-size: 0.75rem;
            font-weight: 700;
            background: #e94560;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
        }
        code {
            font-family: monospace;
            color: #7ec8e3;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Flask App</h1>
        <p>Your Flask application is up and running. Here are the available routes:</p>
        <div class="routes">
            <div class="route">
                <span class="method">GET</span>
                <code>/</code>
                <span>Home page</span>
            </div>
            <div class="route">
                <span class="method">GET</span>
                <code>/api/hello</code>
                <span>JSON greeting</span>
            </div>
            <div class="route">
                <span class="method">GET</span>
                <code>/api/health</code>
                <span>Health check</span>
            </div>
        </div>
    </div>
</body>
</html>
